<!DOCTYPE html>

<html>
    <head>
        <title>Aero Games</title>
        
        <!-- CSS -->  
        <link rel="stylesheet" href="style.css">

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Chango&display=swap" rel="stylesheet">
    </head>
        
    <body>
        <!-- JavaScript -->
        <script src="script.js" defer></script>

        <!-- Menu -->
        <section class="page active" id="menu">
            <h1 class="chango-regular">Aero Games</h1>

            <div class="menu-panel">
                <button onclick="swapPage('games')">Games</button>
                <button onclick="swapPage('apps')">Apps</button>
            </div>
        </section>

        <!-- Games -->
        <section class="page" id="games">
            <div class="content-panel">
                <!-- FNAF 1 -->
                <button class="gamebutton" onclick="allowMusic(false); openGame('assets/games/clFNAF.html')">
                    <div class="icon-wrapper">
                        <img class="gameicon" src="assets/sprites/games/fnaf1.jpg">
                    </div>
                </button>

                <button class="gamebutton" onclick="allowMusic(false); openGame('assets/games/clFNAF2.html')">

            <button onclick="swapPage('menu')">Back</button>
        </section>

        <!-- Apps -->
        <section class="page" id="apps">
            <div class="content-panel">
                <!-- Emulator JS -->
                <button class="gamebutton" onclick="allowMusic(false); openGame('assets/apps/emujs.html')">

                        <img class="gameicon" src="assets/sprites/apps/emulatorjs.webp">

                </button>

                <button class="gamebutton" onclick="allowMusic(false); openGame('assets/apps/soundboard.html')">

                        <img class="gameicon" src="assets/sprites/apps/soundboard.webp">
                    </div>
                </button>

                <!-- 30 Dollar Website -->
                <button class="gamebutton" onclick="allowMusic(false); openGame('assets/apps/dontyoulectureme.html')">

                    </div>
                </button>
            </div>

            <button onclick="swapPage('menu')">Back</button>
        </section>

        <!-- Game/App View -->
         <section class="page" id="view">
            <div class="panel">
                <iframe id="gameappframe" src="https://google.com"></iframe>
            </div>

            <button onclick="closeView()">Back</button>
            <button onclick="toggleFullscreen()">Fullscreen</button>
         </section>

        <!-- Other Stuff -->
        <audio id="music">
            <source id="musicsource" src="assets/audio/aquatic-ambience.mp3" type="audio/mpeg">
            Your browser doesn't support audio.
        </audio>

        <div id="nowplaying"><h2>Now Playing: [SONG-NAME]</h2></div>
